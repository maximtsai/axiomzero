<body onload="onloadFunc()">

    <div id="preload">
        <span style="font-family: 'Michroma'">.</span>
        <span style="font-family: 'JetBrainsMono_Regular'">.</span>
        <span style="font-family: 'JetBrainsMono_Bold'">.</span>
        <span style="font-family: 'JetBrainsMono_Italic'">.</span>
        <span style="font-family: 'VCR'">.</span>
    </div>

    <div id="preload-notice">INITIALIZING SYSTEM...</div>

    <script>
        // Simple focus handler for CrazyGames/Portals
        window.addEventListener('mousedown', function() {
            window.focus();
        });

        // Service Worker — dynamic asset caching for faster repeat loads.
        // Controlled by FLAGS.USE_SERVICE_WORKER in flags.js.
        if (FLAGS.USE_SERVICE_WORKER && 'serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              reg.addEventListener('updatefound', function () {
                // optional: notify user that an update is available
              });
            })
            .catch(err => console.warn('SW registration failed', err));
        }
    </script>
    <script src="js/main.js"></script>
</body>
